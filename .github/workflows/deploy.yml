name: ci-cd

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore ObjectChess.Web/ObjectChess.csproj
          dotnet restore ObjectChess.Tests/ObjectChess.Tests.csproj

      - name: Test
        run: dotnet test ObjectChess.Tests/ObjectChess.Tests.csproj -c Release

      - name: Publish
        run: dotnet publish ObjectChess.Web/ObjectChess.csproj -c Release -o ./publish

      # Write the production connection string from a GitHub secret so it ships
      # with the deploy and never lives in the repo. jq escapes it safely.
      - name: Create production appsettings
        run: |
          jq -n --arg conn "$CONN" '{ConnectionStrings: {DefaultConnection: $conn}}' > ./publish/appsettings.Production.json
        env:
          CONN: ${{ secrets.MONSTERASP_CONNECTION_STRING }}

      - name: Deploy to MonsterASP (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.MONSTERASP_FTP_SERVER }}
          username: ${{ secrets.MONSTERASP_FTP_USERNAME }}
          password: ${{ secrets.MONSTERASP_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
