name: ci-cd

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore ObjectChess.Web/ObjectChess.csproj
          dotnet restore ObjectChess.Tests/ObjectChess.Tests.csproj

      - name: Test
        run: dotnet test ObjectChess.Tests/ObjectChess.Tests.csproj -c Release

      - name: Publish
        run: dotnet publish ObjectChess.Web/ObjectChess.csproj -c Release -o ./publish

      # Write the production connection string from a GitHub secret so it ships
      # with the deploy and never lives in the repo.
      - name: Create production appsettings
        shell: pwsh
        run: |
          $config = @{ ConnectionStrings = @{ DefaultConnection = $env:CONN } } | ConvertTo-Json
          $config | Out-File -FilePath ./publish/appsettings.Production.json -Encoding utf8
        env:
          CONN: ${{ secrets.MONSTERASP_CONNECTION_STRING }}

      - name: Deploy to MonsterASP (Web Deploy)
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.MONSTERASP_SITE_NAME }}
          server-computer-name: ${{ secrets.MONSTERASP_SERVER }}
          server-username: ${{ secrets.MONSTERASP_USERNAME }}
          server-password: ${{ secrets.MONSTERASP_PASSWORD }}
          source-path: ./publish
